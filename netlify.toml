[functions]
  node_bundler = "esbuild"
  external_node_modules = []

# PWA 分開安裝用路徑：讓報價單 App 與管理 App 有不同 scope，手機才能分成兩個 icon。
[[redirects]]
  from = "/quote/*"
  to   = "/index.html"
  status = 200

[[redirects]]
  from = "/admin/*"
  to   = "/quotes.html"
  status = 200


# 顧客分享用日期流水號網址，例如 /20260527-001
# 僅攔截以 20 開頭的根路徑，避免影響 /app.js、/quotes.html 等靜態檔案。
[[redirects]]
  from = "/20*"
  to   = "/index.html"
  status = 200

# 相容上一版漂亮短網址，例如 /q/ABCD2345EFGH
[[redirects]]
  from = "/q/*"
  to   = "/index.html"
  status = 200


[[redirects]]
  from = "/api/view"
  to   = "/.netlify/functions/view"
  status = 200

[[redirects]]
  from = "/api/share"
  to   = "/.netlify/functions/share"
  status = 200

[[redirects]]
  from = "/api/lock"
  to   = "/.netlify/functions/lock"
  status = 200

[[redirects]]
  from = "/api/confirm"
  to   = "/.netlify/functions/confirm"
  status = 200

[[redirects]]
  from = "/api/delete"
  to   = "/.netlify/functions/delete"
  status = 200

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
