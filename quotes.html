        <div class="col-sm-5 col-md-4">
          <input id="q" class="form-control" placeholder="搜尋 客戶 / 電話 / 地址 / 技師 / ID">

<script>
  // Guard against extension-injected cross-origin CSS rules errors
  function isCrossOriginCssRulesError(msg) {
    msg = String(msg || '');
    return msg.includes('CSSStyleSheet') && (msg.includes('rules') || msg.includes('cssRules'));
  }
  window.addEventListener('error', function (e) {
    const src = String(e?.filename || '');
    const msg = String(e?.message || '');
    if (src.startsWith('chrome-extension://') || src.startsWith('moz-extension://')) {
      e.preventDefault?.();
      return true;
    }
    if (isCrossOriginCssRulesError(msg)) {
      e.preventDefault?.();
      return true;
    }
  }, true);
  window.addEventListener('unhandledrejection', function (e) {
    const reason = e?.reason;
    const msg = String(reason?.message || reason || '');
    if (isCrossOriginCssRulesError(msg)) {
      e.preventDefault?.();
      return true;
    }
  }, true);
</script><script>
const $ = s => document.querySelector(s);
const $$ = s => Array.from(document.querySelectorAll(s));

// 支援 file:// 開檔：自動偵測 Netlify Functions 網域（必要時可在頁面最上方自行指定 SITE_ORIGIN）
const ORIGIN = (location.origin && !String(location.origin).startsWith('file'))
  ? location.origin
  : (window.SITE_ORIGIN || 'https://unclequotation.netlify.app');

let NEXT = "";
let LAST_TOTAL = null;
let TOTAL_KNOWN = false;
let CURRENT_SORT = 'desc';      // 'desc' 最新優先；'asc' 最舊優先
let CURRENT_FILTER = 'all';     // 'all' | 'active' | 'cancelled'
const seen = new Set();

function fmtMoney(n){ try{ return Number(n||0).toLocaleString() + " 元"; }catch(_){ return String(n); } }
function updateStats(){
  const el = $("#loadStats");
  if (!el) return;
  el.textContent = `已載入 ${seen.size}${TOTAL_KNOWN && LAST_TOTAL != null ? " / " + LAST_TOTAL : ""} 筆` + (NEXT ? "（可載入更多）" : "（已到最後）");
}
function toStartOfDay(d){ const t = new Date(d); t.setHours(0,0,0,0); return t; }
function toEndOfDay(d){ const t = new Date(d); t.setHours(23,59,59,999); return t; }
function getSelectedPeriodRange(){
  const sel = $("#periodSel")?.value || "month";
  const now = new Date();
  if (sel === "week"){
    const day = (now.getDay() + 6) % 7;
    const start = new Date(now); start.setDate(now.getDate() - day);
    const end = new Date(start); end.setDate(start.getDate() + 6);
    return [toStartOfDay(start), toEndOfDay(end)];
  } else if (sel === "year"){
    const start = new Date(now.getFullYear(), 0, 1);
    const end = new Date(now.getFullYear(), 11, 31);
    return [toStartOfDay(start), toEndOfDay(end)];
  } else if (sel === "custom"){
    const s = $("#startDate")?.value, e = $("#endDate")?.value;
    const start = s ? toStartOfDay(new Date(s)) : new Date(0);
    const end = e ? toEndOfDay(new Date(e)) : new Date(8640000000000000);
    return [start, end];
  } else {
    const start = new Date(now.getFullYear(), now.getMonth(), 1);
    const end = new Date(now.getFullYear(), now.getMonth()+1, 0);
    return [toStartOfDay(start), toEndOfDay(end)];
  }
}
function withinRange(ts, start, end){
  if (Number.isNaN(ts)) return false;
  const d = new Date(ts);
  return d >= start && d <= end;
}

async function fetchList(next=""){
  const url = new URL("/.netlify/functions/list", ORIGIN);
  if (next) url.searchParams.set("next", next);
  const r = await fetch(url, { cache: "no-store" });
  if (!r.ok) throw new Error("list failed: " + r.status);
  return await r.json();
}
async function fetchDetail(id){
  const url = new URL("/.netlify/functions/view", ORIGIN);
  url.searchParams.set("id", id);
  const r = await fetch(url, { cache: "no-store" });
  if (!r.ok) return null;
  return await r.json();
}
function fmtDate(s){
  try{ return new Date(s).toLocaleString(); }catch(_){ return s || ""; }
}
function escapeHtml(s){ return String(s||"").replace(/[&<>"']/g, m=>({ "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;" }[m])); }

function applyClientSortAndFilter(){
  // 依期間篩選（預設=本月）
  const [start, end] = getSelectedPeriodRange();
  const tbody = $("#rows");
  const rows = Array.from(tbody.querySelectorAll("tr")).filter(tr=> tr.querySelector(".id-mono"));

  // ✅ 修正排序：用 data-ts（timestamp）而不是第一欄的文字日期
  rows.sort((a,b)=>{
    const ta = parseInt(a.getAttribute("data-ts") || "0", 10);
    const tb = parseInt(b.getAttribute("data-ts") || "0", 10);
    return CURRENT_SORT === 'asc' ? ta - tb : tb - ta;
  });
  rows.forEach(tr=> tbody.appendChild(tr));

  // 狀態篩選（依 data-cancelled）
  rows.forEach(tr=>{
    const isCancelled = tr.getAttribute('data-cancelled') === '1';
    const visible = (CURRENT_FILTER === 'all') ||
                    (CURRENT_FILTER === 'active' && !isCancelled) ||
                    (CURRENT_FILTER === 'cancelled' && isCancelled);
    const ts = parseInt(tr.getAttribute('data-ts') || 'NaN', 10);
    const inRange = withinRange(ts, start, end);
    tr.classList.toggle('d-none', !(visible && inRange));
  });
}

function recomputeAggregates(){
  const [start, end] = getSelectedPeriodRange();
  let sumAll = 0;
  let sumPeriod = 0;

  $$("#rows tr").forEach(tr=>{
    const cancelled = tr.getAttribute('data-cancelled') === '1';
    const total = parseInt(tr.getAttribute('data-total') || "0", 10) || 0;
    const ts = parseInt(tr.getAttribute('data-ts') || "NaN", 10);
    if (!cancelled){
      sumAll += total;
      if (withinRange(ts, start, end)){
        sumPeriod += total;
      }
    }
  });

  const agg = $("#aggTotals");
  const mon = $("#monthTotals");
  if (agg) agg.textContent = `未作廢合計：${fmtMoney(sumAll)}`;
  const sel = $("#periodSel");
  const label = sel ? sel.options[sel.selectedIndex].text : "期間";
  if (mon) mon.textContent = `${label} 未作廢：${fmtMoney(sumPeriod)}`;
}

function showError(msg){
  const tbody = document.querySelector("#rows");
  if (!tbody) return;
  const safe = String(msg||"").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  tbody.innerHTML = `<tr><td colspan="6" class="text-danger py-4 text-center">
    載入失敗：${safe}<br>
    <small>請確認網域是否正確（目前：${ORIGIN}）與 Netlify Functions 是否已部署。</small>
  </td></tr>`;
}

function renderItems(items){
  const tbody = $("#rows");
  if (!items || !items.length){
    updateStats();
    if (!tbody.children.length) tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted py-5">目前沒有符合條件的報價單，您可以調整搜尋條件或建立新的報價單。</td></tr>';
    return;
  }
  if (tbody.children.length === 1 && tbody.querySelector("td")?.textContent.includes("載入中")) tbody.innerHTML = "";
  const frag = document.createDocumentFragment();

  for (const it of items){
    const uniqueKey = it.public_id || it.id;
    if (seen.has(uniqueKey)) continue;
    seen.add(uniqueKey);

    const tr = document.createElement("tr");
    tr.setAttribute("data-ts", String(new Date(it.created_at).getTime() || ""));
    tr.innerHTML = `
      <td class="text-nowrap">${fmtDate(it.created_at)}</td>
      <td class="cust-cell text-muted small">—</td>
      <td class="total-cell fw-bold">—</td>
      <td class="status-cell">—</td>
      <td class="id-mono small">${escapeHtml(it.id)}</td>
      <td>
        <div class="btn-group">
          <a class="btn btn-primary btn-sm" href="${it.link}" target="_blank">開啟</a>
          <button class="btn btn-outline-secondary btn-sm copy">複製連結</button>
          <button type="button" class="btn btn-outline-secondary btn-sm dropdown-toggle dropdown-toggle-split" data-bs-toggle="dropdown" aria-expanded="false">
            <span class="visually-hidden">更多操作</span>
          </button>
          <ul class="dropdown-menu dropdown-menu-end">
            <li><button class="dropdown-item text-danger delete" type="button">刪除</button></li>
          </ul>
        </div>
      </td>
    `;
    tr.querySelector(".copy").addEventListener("click", async ()=>{
      try{ await navigator.clipboard.writeText(it.link);
           const b=tr.querySelector(".copy"); const t=b.textContent; b.textContent="已複製"; setTimeout(()=>b.textContent=t,1200);
      }catch(_){ alert("複製失敗"); }
    });
    // 刪除按鈕
    tr.querySelector(".delete").addEventListener("click", async ()=>{
      const __ok = await new Promise(r => showDeleteConfirm({ id: it.id }, r)); if (!__ok) return;
      try{
        const url = new URL("/.netlify/functions/delete", ORIGIN);
        const r = await fetch(url, {
          method: "POST",
          headers: { "Content-Type":"application/json" },
          body: JSON.stringify({ id: it.id })
        });
        if (!r.ok) {
          const txt = await r.text();
          alert("刪除失敗：" + txt);
          return;
        }
        tr.remove();
        seen.delete(it.public_id || it.id);
        updateStats();
        recomputeAggregates();
      }catch(err){
        console.error(err);
        alert("刪除失敗，請稍後再試");
      }
    });
    frag.appendChild(tr);

    // Lazy 取詳細（客戶/合計/作廢狀態）
    fetchDetail(it.id).then(data=>{
      const cust = (data?.data?.customer || "").trim() || (data?.resource?.context?.custom?.customer || data?.context?.custom?.customer || "");
      const promoComp = data?.data?.promo?.computed || null;
      const displayTotalNum = Number((promoComp && (promoComp.grandTotal ?? promoComp.total)) ?? (data?.data?.total ?? 0));
      const total = String(displayTotalNum);

      const rtags = (data?.resource?.tags || data?.tags || []);
      const ctxc = (data?.resource?.context?.custom || data?.context?.custom || {});
      const cancelled = Boolean(
        String(ctxc.status||'').toLowerCase()==='cancelled' || ctxc.canceled===true || ctxc.cancelled===true ||
        (Array.isArray(rtags) && rtags.includes('cancelled'))
      );
      const locked = Boolean(
        data?.locked===true || ctxc.locked===true || String(ctxc.locked)==='1' || String(ctxc.status||'').toLowerCase()==='confirmed' ||
        (Array.isArray(rtags) && rtags.includes('locked'))
      );
      const c = tr.querySelector(".cust-cell");
      const t = tr.querySelector(".total-cell");
      c.textContent = cust || "—";
      t.textContent = total ? (Number(total)||0).toLocaleString() + " 元" : "—";
      tr.setAttribute('data-cancelled', cancelled ? '1' : '0');
      tr.setAttribute('data-total', String(Number(total)||0));
      const statusCell = tr.querySelector('.status-cell');
      const statusText = cancelled ? '已作廢' : (locked ? '已確認' : '待確認');
      const statusClass = cancelled ? 'bg-danger' : (locked ? 'bg-success' : 'bg-info');
      // 解析作廢原因：優先 context.custom，再看 tags（unicode 版本優先）
      const reasonRaw = (
        ctxc.cancel_reason ||
        (Array.isArray(rtags)
          ? (rtags.find(t => t.startsWith('cancel_reason_u_')) ||
             rtags.find(t => t.startsWith('cancel_reason_')) || '')
          : '')
      );
      let reason = '';
      try{
        const v = String(reasonRaw||'').replace(/^cancel_reason_u?_/, '');
        reason = decodeURIComponent(v.replace(/\+/g,' '));
      }catch(_){ reason = String(reasonRaw||''); }

      if (statusCell) {
        const tip = reason ? ('原因：' + escapeHtml(reason)) : statusText;
        statusCell.innerHTML =
          `<span class="badge ${statusClass} badge-pill" title="${tip}">${statusText}</span>` +
          (cancelled && reason
            ? `<div class="reason-line"><span class="label">原因：</span><span class="txt">${escapeHtml(reason)}</span></div>`
            : '');
      }
      tr.setAttribute('data-status', cancelled ? 'cancelled' : (locked ? 'confirmed' : 'pending'));
      if (cancelled){
        tr.classList.add("table-danger");}
      applyClientSortAndFilter();
      recomputeAggregates();
    }).catch(()=>{ tr.setAttribute('data-cancelled','0'); }).finally(()=>{ updateStats(); recomputeAggregates(); });
  }
  tbody.appendChild(frag);
  updateStats();
}

async function load(next=""){ 
  try {
    $("#moreBtn").classList.add("d-none");
    const data = await fetchList(next);
    renderItems(data.items || []);
    NEXT = data.next || "";
    if (typeof data._total === "number") { LAST_TOTAL = data._total; TOTAL_KNOWN = !!data._total_known; }
    if (NEXT) $("#moreBtn").classList.remove("d-none");
    // 若已到最後一頁且後端未知總數，就用已載入數補成 N/N
    if (!NEXT && (!TOTAL_KNOWN || LAST_TOTAL == null)) { LAST_TOTAL = seen.size; TOTAL_KNOWN = true; }
    applyClientSortAndFilter();
    updateStats();
    recomputeAggregates();
  } catch (e) { 
    showError(String(e && e.message || e)); 
  }
}

$("#moreBtn").addEventListener("click", ()=> load(NEXT));
$("#reload").addEventListener("click", ()=> { $("#rows").innerHTML=''; NEXT=""; seen.clear(); LAST_TOTAL=null; TOTAL_KNOWN=false; load(); });

// 客戶端搜尋（在已載入的列上篩選）
$("#q").addEventListener("input", e=>{
  const q = e.target.value.trim().toLowerCase();
  $$("#rows tr").forEach(tr=>{
    const txt = tr.textContent.toLowerCase();

document.addEventListener('DOMContentLoaded', ()=>{
  const selSort = $("#sortOrder");
  const selFilter = $("#filterStatus");
  const selPeriod = $('#periodSel');
  const startInp = $('#startDate');
  const endInp = $('#endDate');

  selSort?.addEventListener('change', ()=>{ CURRENT_SORT = selSort.value; applyClientSortAndFilter(); });

  // 原下拉選單改為隱藏，但仍保留邏輯
  selFilter?.addEventListener('change', ()=>{
    CURRENT_FILTER = selFilter.value;
    applyClientSortAndFilter();

    // 同步更新狀態快篩按鈕的 active 樣式
    const buttons = $$('.status-toggle-group button[data-status]');
    buttons.forEach(btn=>{
      btn.classList.toggle('active', btn.getAttribute('data-status') === selFilter.value);
    });
  });

  // 狀態快篩按鈕群組：點選時更新隱藏下拉與 CURRENT_FILTER
  const statusButtons = $$('.status-toggle-group button[data-status]');
  statusButtons.forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const val = btn.getAttribute('data-status') || 'all';
      if (selFilter){
        selFilter.value = val;
        selFilter.dispatchEvent(new Event('change'));
      } else {
        CURRENT_FILTER = val;
        applyClientSortAndFilter();
      }
    });
  });

  selPeriod?.addEventListener('change', ()=>{
    const v = selPeriod.value;
    const isCustom = v === 'custom';
    startInp.classList.toggle('d-none', !isCustom);
    endInp.classList.toggle('d-none', !isCustom);
    applyClientSortAndFilter();
    recomputeAggregates();
  });
  startInp?.addEventListener('change', ()=>{ applyClientSortAndFilter(); recomputeAggregates(); });
  endInp?.addEventListener('change', ()=>{ applyClientSortAndFilter(); recomputeAggregates(); });


  /* init period inputs */
  {
    const v = selPeriod?.value || 'month';
    const isCustom = v === 'custom';
    startInp.classList.toggle('d-none', !isCustom);
    endInp.classList.toggle('d-none', !isCustom);
  }
  $('#exportCsv')?.addEventListener('click', exportCsv);

  load();
});

function exportCsv(){
  const rows = $$("#rows tr").filter(tr => !tr.classList.contains("d-none") && tr.querySelector(".id-mono"));
  const header = ["建立時間","客戶","合計","確認","ID","連結"];
  const lines = [header.join(",")];
  for (const tr of rows){
    const dt = tr.children[0]?.textContent.trim() || "";
    const cust = tr.querySelector(".cust-cell")?.textContent.trim() || "";
    const total = tr.getAttribute("data-total") || tr.querySelector(".total-cell")?.textContent.replace(/[^0-9]/g,"") || "0";
    const id = tr.querySelector(".id-mono")?.textContent.trim() || "";
    const cancelled = tr.getAttribute("data-cancelled") === "1";
    const link = tr.querySelector("a.btn.btn-primary")?.href || "";
    const status = tr.getAttribute("data-status") || "pending";
const statusZh = status==="cancelled" ? "已作廢" : (status==="confirmed" ? "已確認" : "待確認");
const cells = [dt, cust, total, statusZh, id, link].map(x => `"${String(x).replace(/"/g,'""')}"`);
    lines.push(cells.join(","));
  }
  const blob = new Blob([lines.join("\n")], { type: "text/csv;charset=utf-8;" });
  const a = document.createElement("a");
  const url = URL.createObjectURL(blob);
  a.href = url;
  const now = new Date();
  a.download = `quotes_export_${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}-${String(now.getDate()).padStart(2,"0")}.csv`;
  document.body.appendChild(a);
  a.click();
  setTimeout(()=>{ URL.revokeObjectURL(url); a.remove(); }, 0);
}
</script><script>
function updateMonthLabel(){
  try{
    const label = document.getElementById('monthLabel');
    if (!label) return;
    const sel = document.getElementById('periodSel');
    const [start, end] = typeof getSelectedPeriodRange === 'function'
      ? getSelectedPeriodRange()
      : [null, null];

    const fmt = (d)=>{
      if (!d || !(d instanceof Date) || Number.isNaN(d.getTime())) return '';
      const y = d.getFullYear();
      const m = String(d.getMonth()+1).padStart(2,'0');
      const day = String(d.getDate()).padStart(2,'0');
      return `${y}-${m}-${day}`;
    };

    const labelText = (()=>{
      if (!sel) return '';
      const opt = sel.options[sel.selectedIndex];
      return opt ? opt.text.trim() : '';
    })();

    if (start && end){
      label.textContent = `📅 顯示 ${fmt(start)} ～ ${fmt(end)} 報價單（${labelText}）`;
    } else {
      label.textContent = `📅 報價單列表（${labelText || '全部期間'}）`;
    }
  }catch(_){}
}

document.addEventListener('DOMContentLoaded', function(){
  updateMonthLabel();
  const sel = document.getElementById('periodSel');
  const startInp = document.getElementById('startDate');
  const endInp = document.getElementById('endDate');
  [sel, startInp, endInp].forEach(function(el){
    if (!el) return;
    el.addEventListener('change', updateMonthLabel);
  });
});
</script><script>

function showDeleteConfirm(meta, cb){
  try{
    var id = (meta && meta.id) || '';
    var el = document.getElementById('deleteConfirmModal');
    var idSpan = document.getElementById('delIdText');
    if (idSpan) idSpan.textContent = id || '—';
    var Modal = (window.bootstrap || window.bootstrap5 || {}).Modal;
    if (!Modal || !el){
      var ok = confirm('確定要刪除這筆報價單嗎？此動作無法復原。\nID：' + id);
      cb && cb(!!ok);
      return;
    }
    var m = new Modal(el, { backdrop:'static' });
    var submit = document.getElementById('deleteConfirmSubmit');
    function cleanup(){
      try{
        submit.removeEventListener('click', onOk);
        el.removeEventListener('hidden.bs.modal', onHide);
      }catch(_){}
    }
    function onOk(){ cleanup(); m.hide(); cb && cb(true); }
    function onHide(){ cleanup(); cb && cb(false); }
    submit.addEventListener('click', onOk);
    el.addEventListener('hidden.bs.modal', onHide, { once:true });
    m.show();
  }catch(e){ cb && cb(!!confirm('確定要刪除這筆報價單嗎？此動作無法復原。')); }
}
